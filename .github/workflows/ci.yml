name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install ruff black mypy
          pip install -r backend/requirements.txt

      - name: Ruff (linter)
        run: ruff check backend/

      - name: Black (formatter check)
        run: black --check backend/

      - name: Mypy (type checker)
        run: mypy backend/ --ignore-missing-imports

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: verifid_test
          POSTGRES_USER: verifid
          POSTGRES_PASSWORD: verifid_secret
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U verifid"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://verifid:verifid_secret@localhost:5432/verifid_test
          REDIS_URL: redis://localhost:6379/0
          AUTH_BYPASS: "true"
        run: |
          cd backend
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing -x

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install tools
        run: pip install bandit pip-audit

      - name: Bandit (static analysis)
        run: bandit -r backend/ -c pyproject.toml --severity-level medium -f json -o bandit-report.json || true

      - name: pip-audit (dependency vulnerabilities)
        run: pip-audit -r backend/requirements.txt --desc --fix --dry-run

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t verifid-api:${{ github.sha }} backend/

      - name: Build nginx image
        run: docker build -t verifid-nginx:${{ github.sha }} infra/nginx/

      - name: Trivy scan (backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: verifid-api:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH

      - name: Trivy scan (nginx)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: verifid-nginx:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH

  schema:
    name: Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Validate OpenAPI schema
        run: |
          cd backend
          python -c "
          from api.main import app
          import json
          schema = app.openapi()
          print(f'OpenAPI schema valid: {len(schema[\"paths\"])} paths')
          "
