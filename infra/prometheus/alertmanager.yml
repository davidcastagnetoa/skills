global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: "default"
  routes:
    - match:
        severity: critical
      receiver: "critical"
      group_wait: 5s
      repeat_interval: 5m
    - match:
        severity: warning
      receiver: "warning"
      repeat_interval: 30m

receivers:
  - name: "default"
    # In production: configure Slack, PagerDuty, or email
    # For dev: alerts are visible in Alertmanager UI at :9093

  - name: "critical"
    # webhook_configs:
    #   - url: "https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK"
    #     send_resolved: true

  - name: "warning"
    # email_configs:
    #   - to: "ops@verifid.com"
    #     send_resolved: true

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname"]
