global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alerting rules
rule_files:
  - /etc/prometheus/alerts.yml

# Alertmanager integration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # FastAPI application
  - job_name: "verifid-api"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "verifid-api"

  # Celery workers (if exposing metrics)
  - job_name: "celery-workers"
    metrics_path: /metrics
    static_configs:
      - targets: ["celery-worker:9100"]
        labels:
          service: "celery-worker"

  # Redis exporter
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: "redis"

  # PostgreSQL exporter
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: "postgresql"

  # Node exporter (host metrics)
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: "host"

  # Nginx (via stub_status or VTS module)
  - job_name: "nginx"
    static_configs:
      - targets: ["nginx:9113"]
        labels:
          service: "nginx"
