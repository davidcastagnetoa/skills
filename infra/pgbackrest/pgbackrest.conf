# pgBackRest Configuration for VerifID PostgreSQL HA
# Documentation: https://pgbackrest.org/configuration.html

[global]
# --- Repository (MinIO S3-compatible) ---
repo1-type=s3
repo1-s3-endpoint=minio:9000
repo1-s3-bucket=pgbackrest
repo1-s3-region=us-east-1
repo1-s3-key=minioadmin
repo1-s3-key-secret=minioadmin
repo1-s3-uri-style=path
repo1-s3-verify-tls=n

# --- Encryption ---
repo1-cipher-type=aes-256-cbc
repo1-cipher-pass=change-me-pgbackrest-encryption-key

# --- Retention ---
repo1-retention-full=4
repo1-retention-diff=14

# --- Compression ---
compress-type=zst
compress-level=3

# --- Parallel processing ---
process-max=2

# --- Logging ---
log-level-console=info
log-level-file=detail

[verifid]
# --- PostgreSQL connection ---
pg1-path=/var/lib/postgresql/data
pg1-port=5432
pg1-user=verifid
