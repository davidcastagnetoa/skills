worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # --- JSON structured access log ---
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request_method":"$request_method",'
            '"request_uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_user_agent":"$http_user_agent",'
            '"http_x_forwarded_for":"$http_x_forwarded_for",'
            '"request_id":"$request_id"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # --- Performance ---
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # --- Gzip compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        text/plain
        text/css
        text/xml;

    # --- Brotli (if module available) ---
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types application/json text/plain;

    # --- Request body size limit (10MB for images) ---
    client_max_body_size 10m;

    # --- Rate limiting zones ---
    # General: 60 req/min per IP
    limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;
    # Verify endpoint: 10 req/min per IP
    limit_req_zone $binary_remote_addr zone=verify:10m rate=10r/m;

    # --- Lua shared dictionaries ---
    lua_shared_dict jwt_cache 10m;
    lua_shared_dict circuit_breaker 1m;

    # --- Upstream ---
    upstream verifid_api {
        server api:8000;
        keepalive 32;
    }

    # --- HTTP → HTTPS redirect ---
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # --- Main HTTPS server ---
    server {
        listen 443 ssl http2;
        server_name _;

        # --- TLS 1.3 ---
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # --- Security headers ---
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self'" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # --- CORS (handled by Lua for flexibility) ---
        set $cors_origin "";
        if ($http_origin ~* "^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$") {
            set $cors_origin $http_origin;
        }

        # --- Health check (no auth) ---
        location /health {
            limit_req zone=general burst=5 nodelay;
            proxy_pass http://verifid_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $request_id;
        }

        location /ready {
            limit_req zone=general burst=5 nodelay;
            proxy_pass http://verifid_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $request_id;
        }

        # --- Verify endpoint (stricter rate limit) ---
        location /api/v1/verify {
            limit_req zone=verify burst=3 nodelay;
            limit_req_status 429;

            # JWT/API Key validation via Lua
            access_by_lua_file /etc/nginx/lua/auth.lua;

            # Circuit breaker check
            access_by_lua_file /etc/nginx/lua/circuit_breaker.lua;

            proxy_pass http://verifid_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 15s;
            proxy_connect_timeout 5s;

            # Rate limit headers
            add_header X-RateLimit-Limit "10" always;
        }

        # --- Other API endpoints ---
        location /api/ {
            limit_req zone=general burst=10 nodelay;
            limit_req_status 429;

            access_by_lua_file /etc/nginx/lua/auth.lua;

            proxy_pass http://verifid_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 10s;
        }

        # --- Metrics (internal only) ---
        location /metrics {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 127.0.0.1;
            deny all;
            proxy_pass http://verifid_api;
        }

        # --- Error pages ---
        error_page 429 /429.json;
        location = /429.json {
            default_type application/json;
            return 429 '{"detail":"Rate limit exceeded","retry_after":60}';
        }

        error_page 503 /503.json;
        location = /503.json {
            default_type application/json;
            return 503 '{"detail":"Service temporarily unavailable"}';
        }
    }
}
