# Production overrides

replicaCount:
  api: 3
  celeryWorker: 4
  celeryBeat: 1
  nginx: 2

app:
  env: production
  debug: false
  logLevel: WARNING

autoscaling:
  api:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilization: 65
  celeryWorker:
    enabled: true
    minReplicas: 4
    maxReplicas: 16
    targetCPUUtilization: 75

resources:
  api:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  celeryWorker:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 4Gi
