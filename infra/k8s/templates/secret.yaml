apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    # In production, use SealedSecrets or External Secrets Operator
    # This template is a placeholder — do NOT commit real secrets
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://{{ .Values.postgresql.username }}:CHANGE_ME@{{ .Values.postgresql.host }}:{{ .Values.postgresql.port }}/{{ .Values.postgresql.database }}"
  REDIS_URL: "redis://{{ .Values.redis.host }}:{{ .Values.redis.port }}/0"
  CELERY_BROKER_URL: "redis://{{ .Values.redis.host }}:{{ .Values.redis.port }}/1"
  CELERY_RESULT_BACKEND: "redis://{{ .Values.redis.host }}:{{ .Values.redis.port }}/2"
  JWT_SECRET_KEY: "CHANGE_ME"
  ENCRYPTION_KEY: "CHANGE_ME_32_BYTE_KEY"
