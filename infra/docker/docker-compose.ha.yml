# PostgreSQL High Availability with Patroni + PgBouncer
# Usage: docker compose -f docker-compose.yml -f docker-compose.ha.yml up

services:
  # --- etcd (Patroni consensus) ---
  etcd:
    image: bitnami/etcd:3.5
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
    ports:
      - "2379:2379"
    restart: unless-stopped

  # --- PostgreSQL Primary (Patroni) ---
  pg-primary:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: verifid
      POSTGRES_USER: verifid
      POSTGRES_PASSWORD: verifid_secret
      PATRONI_SCOPE: verifid
      PATRONI_NAME: pg-primary
      PATRONI_ETCD_HOSTS: etcd:2379
      PATRONI_REPLICATION_USERNAME: replicator
      PATRONI_REPLICATION_PASSWORD: repl_secret
      PATRONI_SUPERUSER_USERNAME: verifid
      PATRONI_SUPERUSER_PASSWORD: verifid_secret
    volumes:
      - pg-primary-data:/var/lib/postgresql/data
    depends_on:
      - etcd
    restart: unless-stopped

  # --- PostgreSQL Replica (Patroni) ---
  pg-replica:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: verifid
      POSTGRES_USER: verifid
      POSTGRES_PASSWORD: verifid_secret
      PATRONI_SCOPE: verifid
      PATRONI_NAME: pg-replica
      PATRONI_ETCD_HOSTS: etcd:2379
      PATRONI_REPLICATION_USERNAME: replicator
      PATRONI_REPLICATION_PASSWORD: repl_secret
    volumes:
      - pg-replica-data:/var/lib/postgresql/data
    depends_on:
      - etcd
      - pg-primary
    restart: unless-stopped

  # --- PgBouncer (Connection Pooler) ---
  pgbouncer:
    image: bitnami/pgbouncer:1.22.0
    ports:
      - "6432:6432"
    environment:
      PGBOUNCER_DATABASE: verifid
      POSTGRESQL_HOST: pg-primary
      POSTGRESQL_PORT: 5432
      POSTGRESQL_USERNAME: verifid
      POSTGRESQL_PASSWORD: verifid_secret
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 200
      PGBOUNCER_DEFAULT_POOL_SIZE: 20
      PGBOUNCER_MIN_POOL_SIZE: 5
    depends_on:
      - pg-primary
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "6432"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # --- pgBackRest (Backup Server) ---
  pgbackrest:
    image: pgbackrest/pgbackrest:latest
    environment:
      PGBACKREST_STANZA: verifid
    volumes:
      - ../pgbackrest/pgbackrest.conf:/etc/pgbackrest/pgbackrest.conf:ro
      - pg-primary-data:/var/lib/postgresql/data:ro
    depends_on:
      - pg-primary
      - minio
    restart: unless-stopped
    # Cron-like backup schedule (run manually or via celery-beat):
    #   Full backup weekly:  pgbackrest --stanza=verifid --type=full backup
    #   Diff backup daily:   pgbackrest --stanza=verifid --type=diff backup
    #   WAL archiving:       configured via PostgreSQL archive_command

volumes:
  pg-primary-data:
  pg-replica-data:
