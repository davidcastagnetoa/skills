services:
  # --- FastAPI Backend ---
  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ../../backend:/app
      - ../../models:/app/models:ro
    command: >
      uvicorn api.main:app
      --host 0.0.0.0
      --port 8000
      --reload
    restart: unless-stopped

  # --- PostgreSQL 16 ---
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: verifid
      POSTGRES_USER: verifid
      POSTGRES_PASSWORD: verifid_secret
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verifid -d verifid"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # --- Redis 7 ---
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # --- MinIO (S3-compatible Object Storage) ---
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # --- Celery Worker (CPU tasks) ---
  celery-worker:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    env_file:
      - ../../.env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ../../backend:/app
      - ../../models:/app/models:ro
    command: >
      celery -A infrastructure.celery_app worker
      --loglevel=info
      --concurrency=2
      -Q cpu,async
    restart: unless-stopped

  # --- Celery Beat (Scheduler) ---
  celery-beat:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    env_file:
      - ../../.env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../../backend:/app
    command: >
      celery -A infrastructure.celery_app beat
      --loglevel=info
    restart: unless-stopped

volumes:
  pg-data:
  redis-data:
  minio-data:
