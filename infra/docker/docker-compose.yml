services:
  # --- Nginx API Gateway ---
  nginx:
    build:
      context: ../nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    environment:
      AUTH_BYPASS: "true"  # Set to "false" in production
      JWT_ENABLED: "false"
      API_KEY_ENABLED: "false"
    depends_on:
      - api
    volumes:
      - ../nginx/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ../nginx/lua:/etc/nginx/lua:ro
    restart: unless-stopped

  # --- FastAPI Backend ---
  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ../../backend:/app
      - ../../models:/app/models:ro
    command: >
      uvicorn api.main:app
      --host 0.0.0.0
      --port 8000
      --reload
    restart: unless-stopped

  # --- PostgreSQL 16 ---
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: verifid
      POSTGRES_USER: verifid
      POSTGRES_PASSWORD: verifid_secret
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verifid -d verifid"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # --- Redis 7 ---
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # --- MinIO (S3-compatible Object Storage) ---
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # --- Celery Worker (CPU tasks) ---
  celery-worker:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    env_file:
      - ../../.env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ../../backend:/app
      - ../../models:/app/models:ro
    command: >
      celery -A infrastructure.celery_app worker
      --loglevel=info
      --concurrency=2
      -Q cpu,async
    restart: unless-stopped

  # --- Celery Beat (Scheduler) ---
  celery-beat:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    env_file:
      - ../../.env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../../backend:/app
    command: >
      celery -A infrastructure.celery_app beat
      --loglevel=info
    restart: unless-stopped

  # --- Prometheus ---
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  # --- Grafana ---
  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: verifid
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  # --- Jaeger (Distributed Tracing) ---
  jaeger:
    image: jaegertracing/all-in-one:1.55
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    restart: unless-stopped

  # --- Alertmanager ---
  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "9093:9093"
    volumes:
      - ../prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    restart: unless-stopped

  # --- Node Exporter (host metrics) ---
  node-exporter:
    image: prom/node-exporter:v1.7.0
    ports:
      - "9100:9100"
    restart: unless-stopped

  # --- Redis Exporter ---
  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # --- PostgreSQL Exporter ---
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://verifid:verifid_secret@postgres:5432/verifid?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # --- Triton Inference Server ---
  triton:
    image: nvcr.io/nvidia/tritonserver:24.01-py3
    ports:
      - "8001:8001"   # gRPC
      - "8002:8002"   # Metrics
    volumes:
      - ../triton/model_repository:/models:ro
    command: >
      tritonserver
      --model-repository=/models
      --strict-model-config=false
      --log-verbose=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v2/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  pg-data:
  redis-data:
  minio-data:
  prometheus-data:
  grafana-data:
